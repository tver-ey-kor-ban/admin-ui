name: Deploy

on:
  push:
    branches: [main]

# Prevent overlapping deploys on rapid pushes to main
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Set VITE_API_URL in GitHub → Settings → Variables (Repository variables)
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      # ── Render static site deploy ─────────────────────────────────────────
      # How to set up:
      #   1. Go to your Render dashboard → the static site service for this frontend
      #   2. Settings → Deploy Hook → copy the URL
      #   3. GitHub → Settings → Secrets → New repository secret
      #      Name: RENDER_DEPLOY_HOOK_URL   Value: <the hook URL>
      # Render will pull from the repo and re-build on its own after this trigger.
      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # Remove this step if you are NOT deploying to Render.

      # ── Alternative: Vercel ───────────────────────────────────────────────
