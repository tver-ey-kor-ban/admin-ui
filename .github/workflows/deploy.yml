name: Deploy

on:
  push:
    branches: [main]

# Prevent overlapping deploys on rapid pushes to main
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Set VITE_API_URL in GitHub → Settings → Variables (Repository variables)
          VITE_API_URL: ${{ vars.VITE_API_URL }}

